name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            flavor: minimal
          - os: windows-latest
            flavor: minimal
          # macos-full skipped for v1 — GitHub macos-14 hosted runners cap MPS
          # allocations at ~1 GB regardless of 7 GB physical RAM, causing OOM
          # during Qwen3 KJV precompute. Options for later:
          #  (a) macos-14-xlarge paid runner with real MPS
          #  (b) manual local build + upload full DMG as release asset
          #  (c) switch to CPU path with smaller batch_size (still likely times out)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend deps
        run: bun install

      - name: Run setup recipe
        shell: bash
        env:
          FLAVOR: ${{ matrix.flavor }}
          # Disable PyTorch MPS watermark — GitHub macos-14 runners have 7 GB RAM
          # but MPS caps allocations at ~50% by default, triggering OOM during
          # Qwen3 KJV precompute. 0.0 removes the cap (may OOM on truly tiny boxes,
          # but CI has headroom). No effect on non-macOS runners.
          PYTORCH_MPS_HIGH_WATERMARK_RATIO: "0.0"
        run: |
          if [ "$FLAVOR" = "full" ]; then
            bun run setup:all
          else
            bun run setup:minimal
          fi

      - name: Build Tauri
        shell: bash
        env:
          MANNA_FLAVOR: ${{ matrix.flavor }}
          FLAVOR: ${{ matrix.flavor }}
          RUNNER_OS: ${{ runner.os }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Windows: disable default Cargo features (drops 'whisper' feature to
          # avoid esaxx-rs/whisper-rs-sys CRT mismatch LNK1319). macOS keeps
          # whisper since users may want local STT on full flavor later.
          if [ "$RUNNER_OS" = "Windows" ]; then
            # --no-default-features is a cargo flag, not Tauri's. Forward via --.
            # --bundles nsis restricts to NSIS installer (MSI rejects -rc1 pre-release tags).
            bun run tauri build --bundles nsis --config "src-tauri/tauri.conf.${FLAVOR}.json" -- --no-default-features
          else
            # macOS: restrict to dmg (skip app.tar.gz which the updater-free path doesn't need).
            bun run tauri build --bundles dmg --config "src-tauri/tauri.conf.${FLAVOR}.json"
          fi

      - name: Rename installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          cd src-tauri/target/release/bundle/dmg
          VERSION=$(node -p "require(process.cwd() + '/../../../../../package.json').version")
          for f in *.dmg; do
            mv "$f" "Manna-${VERSION}-${FLAVOR}-macos.dmg"
          done

      - name: Rename installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          FLAVOR: ${{ matrix.flavor }}
        run: |
          cd src-tauri/target/release/bundle/nsis
          VERSION=$(node -p "require(process.cwd() + '/../../../../../package.json').version")
          for f in *.exe; do
            mv "$f" "Manna-${VERSION}-${FLAVOR}-windows.exe"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.flavor }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend deps (for tauri CLI)
        run: bun install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Save changelog to file
        shell: bash
        env:
          NOTES: ${{ steps.cliff.outputs.content }}
        run: |
          printf '%s' "$NOTES" > release-notes.md

      - name: Build updater manifests
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_CONTENT="$(cat release-notes.md)"
          for flavor in minimal full; do
            # Skip flavors with no installers (e.g. full is skipped on CI for v1).
            if ! ls installers/**/*-"$flavor"-*.dmg installers/**/*-"$flavor"-*.exe 2>/dev/null | grep -q .; then
              echo "No installers for flavor=$flavor — skipping manifest"
              continue
            fi
            python3 scripts/build-updater-manifest.py \
              --version "$VERSION" \
              --flavor "$flavor" \
              --installers installers/ \
              --notes "$NOTES_CONTENT" \
              --output "latest-$flavor.json"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/**/*.dmg
            installers/**/*.exe
            latest-minimal.json
            latest-full.json
          fail_on_unmatched_files: false
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
